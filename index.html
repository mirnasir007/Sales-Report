<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Report </title>
  <link rel="icon" type="image/png" href="logo.png">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  
  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; padding: 15px; margin: 0; }
    .container { width: 100%; box-sizing: border-box; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    
    .top-section { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 25px; flex-wrap: wrap; }
    .left-controls { display: flex; flex-direction: column; gap: 15px; flex: 1; min-width: 300px; }
    .control-row { display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; }
    .form-group { display: flex; flex-direction: column; }
    
    .right-missing { flex: 1; border: 2px solid #f44336; border-radius: 8px; padding: 15px; background: #ffebee; min-width: 300px; max-height: 150px; overflow-y: auto; display: none; }
    .right-missing h3 { margin-top: 0; color: #d32f2f; font-size: 16px; margin-bottom: 10px; border-bottom: 1px solid #ef9a9a; padding-bottom: 5px; }
    .missing-list { list-style: none; padding: 0; margin: 0; color: #b71c1c; font-weight: bold; font-size: 14px; display: flex; flex-wrap: wrap; gap: 10px; }
    .missing-list li { background: #ffcdd2; padding: 4px 8px; border-radius: 4px; }
    
    label { font-weight: bold; margin-bottom: 5px; color: #333; }
    input[type="date"] { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 15px; }
    
    .btn { background: #00bcd4; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 15px; font-weight: bold; transition: 0.3s; height: 42px;}
    .btn:hover { background: #008ba3; }
    .btn-excel { background: #4CAF50; display: none; }
    .btn-excel:hover { background: #388E3C; }
    
    #statusMsg { font-weight: bold; font-size: 16px; color: #ff9800; display: none; margin-bottom: 15px; }
    
    .table-responsive { overflow-x: auto; max-height: 600px; border: 1px solid #ddd; }
    table { width: 100%; border-collapse: collapse; background: white; white-space: nowrap; }
    th { background-color: #00bcd4; color: white; padding: 12px; border: 1px solid #ddd; position: sticky; top: 0; z-index: 1;}
    td { padding: 10px; border: 1px solid #ddd; text-align: center; }
    tr:nth-child(even) { background-color: #f9f9f9; }
    tr:hover { background-color: #f1f1f1; }
  </style>
</head>
<body>

  <div class="container">
    
    <div class="top-section">
      <div class="left-controls">
        <div class="control-row">
          <div class="form-group">
            <label>From Date:</label>
            <input type="date" id="fromDate">
          </div>
          <div class="form-group">
            <label>To Date:</label>
            <input type="date" id="endDate">
          </div>
        </div>
        <div class="control-row">
          <button class="btn" onclick="loadReport()">Generate Report</button>
          <button id="excelBtn" class="btn btn-excel" onclick="downloadCourierExcel()">Download Excel</button>
          <span id="statusMsg">Processing Data... ⏳</span>
        </div>
      </div>
      
      <div class="right-missing" id="missingBox">
        <h3>⚠️ Missing Invoices (From POS)</h3>
        <ul class="missing-list" id="missingList"></ul>
      </div>
    </div>

    <div class="table-responsive">
      <table id="reportTable">
        <thead>
          <tr>
            <th>Merchant Order Id</th>
            <th>Recipient Name(*)</th>
            <th>Recipient-Phone(*)</th>
            <th>Recipient Address(*)</th>
            <th>DISC AMT</th>
            <th>NET AMT</th>
            <th>CASH AMT</th>
            <th>CARD AMT</th>
            <th>PAYMENT TYPE</th>
            <th>Quantity</th>
            <th>Product name</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="11" style="text-align:center; padding: 20px; color: #777;">Select dates and click Generate Report</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    let globalMergedData = [];
    
    // script url
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbygGelyFbw30ZERIQBcMGZV9Pligj7n8gzd3PYJfKBE8gyBRNyd_qGNLJzs2o9eNFbi/exec";

    window.onload = function() {
      let today = new Date().toISOString().split('T')[0];
      document.getElementById('fromDate').value = today;
      document.getElementById('endDate').value = today;
    };

    function formatDateForAPI(dateStr) {
      const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      let d = new Date(dateStr);
      return `${String(d.getDate()).padStart(2, '0')}-${months[d.getMonth()]}-${d.getFullYear()}`;
    }

    function parseExcelBase64(base64Str) {
      let binary_string = window.atob(base64Str);
      let len = binary_string.length;
      let bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) { bytes[i] = binary_string.charCodeAt(i); }
      let workbook = XLSX.read(bytes.buffer, {type: 'array'});
      return XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
    }

    function loadReport() {
      let fDate = document.getElementById('fromDate').value;
      let eDate = document.getElementById('endDate').value;
      if(!fDate || !eDate) return alert("Please select both dates!");

      let apiFromDate = formatDateForAPI(fDate);
      let apiEndDate = formatDateForAPI(eDate);

      document.getElementById('statusMsg').style.display = 'inline-block';
      document.getElementById('statusMsg').innerText = "Processing Data... ⏳";
      document.getElementById('excelBtn').style.display = 'none';
      document.getElementById('missingBox').style.display = 'none';
      document.getElementById('tableBody').innerHTML = "";

      // google.script.run changes Fetch API use
      fetch(SCRIPT_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify({
          fromDate: apiFromDate,
          endDate: apiEndDate
        })
      })
      .then(response => response.json())
      .then(res => {
        if(!res.success) {
          document.getElementById('statusMsg').innerText = "Error: " + res.error;
          return;
        }

        try {
          let summaryJson = parseExcelBase64(res.summaryData);
          let detailsJson = parseExcelBase64(res.detailsData);
          let missingCheckJson = parseExcelBase64(res.missingData);

          let detailsMap = {};
          for(let i = 2; i < detailsJson.length; i++) {
            let row = detailsJson[i];
            if(!row || !row[1]) continue; 
            
            let storeName = row[0] ? row[0].toString() : "";
            let invNo = row[1].toString().trim();
            let prodName = row[5] ? row[5].toString().trim() : "";
            let qty = parseFloat(row[8]) || 0; 

            if(storeName.includes('SUB TOTAL:') || prodName.includes('Delivery Charges') || prodName === "") continue; 

            if(!detailsMap[invNo]) detailsMap[invNo] = { qty: 0, products: [] };
            detailsMap[invNo].qty += qty;
            detailsMap[invNo].products.push(prodName);
          }

          let finalData = [];
          let summaryInvoices = new Set();
          
          for(let i = 2; i < summaryJson.length; i++) {
            let row = summaryJson[i];
            if(!row || row.length < 6 || !row[5] || row[0]?.toString().includes('PFF') || row[0]?.toString().includes('Total')) continue;

            let invNo = row[5].toString().trim();
            summaryInvoices.add(invNo);
            let matchedDetails = detailsMap[invNo]; 

            finalData.push({
              INVOICE_NO: invNo,
              CUSTOMER_NAME: row[2] || "",
              CUSTOMER_PHONE: row[3] ? row[3].toString().replace(/\D/g, '').replace(/^88/, '') : "",
              CUSTOMER_ADDRESS: row[4] || "",
              DISC_AMT: row[7] || 0,
              NET_AMT: row[8] || 0,
              CASH_AMT: row[9] || 0,
              CARD_AMT: row[10] || 0,
              PAYMENT_TYPE: row[11] || "",
              QTY: matchedDetails ? matchedDetails.qty : 1, 
              PRODUCTS: matchedDetails ? matchedDetails.products.join(', ') : "Assorted Products"
            });
          }

          finalData.sort((a, b) => a.INVOICE_NO.localeCompare(b.INVOICE_NO));

          globalMergedData = finalData;

          let missingInvoices = [];
          for(let i = 2; i < missingCheckJson.length; i++) {
            let row = missingCheckJson[i];
            if(!row || !row[2]) continue; 
            let invNo = row[2].toString().trim();
            
            if(invNo.includes('INVOICE') || invNo === "" || row[0]?.toString().includes('PFF') || row[0]?.toString().includes('Total')) continue;

            if(!summaryInvoices.has(invNo)) {
              missingInvoices.push(invNo);
            }
          }
          missingInvoices = [...new Set(missingInvoices)];

          if(missingInvoices.length > 0) {
            document.getElementById('missingBox').style.display = 'block';
            document.getElementById('missingList').innerHTML = missingInvoices.map(inv => `<li>${inv}</li>`).join('');
          }

          if(finalData.length === 0) {
            document.getElementById('statusMsg').innerText = "No data found!";
            return;
          }

          document.getElementById('statusMsg').style.display = 'none';
          renderTable(finalData);
          document.getElementById('excelBtn').style.display = 'inline-block';

        } catch(err) {
          document.getElementById('statusMsg').innerText = "Process Failed!";
          console.error(err);
        }
      })
      .catch(error => {
        document.getElementById('statusMsg').innerText = "Network Error! Check console.";
        console.error("Fetch Error: ", error);
      });
    }

    function renderTable(dataList) {
      let tbody = document.getElementById('tableBody');
      let html = "";
      
      dataList.forEach(item => {
        html += `
          <tr>
            <td style="color: #d32f2f; font-weight: bold;">${item.INVOICE_NO}</td>
            <td>${item.CUSTOMER_NAME}</td>
            <td>${item.CUSTOMER_PHONE}</td>
            <td style="white-space: normal; min-width: 150px;">${item.CUSTOMER_ADDRESS}</td>
            <td style="color: #f57c00;">${item.DISC_AMT}</td>
            <td style="font-weight: bold;">${item.NET_AMT}</td>
            <td style="color: #4CAF50;">${item.CASH_AMT}</td>
            <td style="color: #1976D2;">${item.CARD_AMT}</td>
            <td>${item.PAYMENT_TYPE}</td>
            <td style="font-weight: bold; color: #1976D2;">${item.QTY}</td>
            <td style="white-space: normal; min-width: 200px; color: #388E3C;">${item.PRODUCTS}</td>
          </tr>
        `;
      });
      tbody.innerHTML = html;
    }

    function downloadCourierExcel() {
      if(globalMergedData.length === 0) return;
      
      let wsData = [];
      wsData.push(["Merchant Order Id", "Recipient Name(*)", "Recipient-Phone(*)", "Recipient Address(*)", "DISC AMT", "NET AMT", "CASH AMT", "CARD AMT", "PAYMENT TYPE", "Quantity", "Product name"]); 
      
      globalMergedData.forEach(item => {
        wsData.push([
          item.INVOICE_NO, item.CUSTOMER_NAME, item.CUSTOMER_PHONE, 
          item.CUSTOMER_ADDRESS, item.DISC_AMT, item.NET_AMT, item.CASH_AMT, item.CARD_AMT,
          item.PAYMENT_TYPE, item.QTY, item.PRODUCTS 
        ]);
      });

      let ws = XLSX.utils.aoa_to_sheet(wsData);
      let wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Sales_Data");
      XLSX.writeFile(wb, `Sales_Report_${document.getElementById('fromDate').value}.xlsx`);
    }
  </script>
</body>
</html>
